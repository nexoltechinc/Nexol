<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background to blend perfectly with dark mode tabs or contrast in light mode -->
  <rect width="100" height="100" rx="20" fill="#0B0B12" />
  
  <!-- Outer Glow / Ring -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#tealPurpleGradient)" stroke-width="4" stroke-dasharray="40 10 20 10" />
  
  <!-- The sleek 'N' -->
  <path d="M 35 70 L 35 30 L 65 70 L 65 30" fill="none" stroke="url(#primaryGradient)" stroke-width="12" stroke-linejoin="round" stroke-linecap="round" />
  
  <!-- Glowing Dots -->
  <circle cx="35" cy="30" r="4" fill="#5EEAD4" />
  <circle cx="65" cy="70" r="4" fill="#5EEAD4" />

  <defs>
    <!-- Brand Primary Gradient -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6F3DFF" />
      <stop offset="100%" stop-color="#5EEAD4" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="tealPurpleGradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5EEAD4" />
      <stop offset="50%" stop-color="#9B8CFF" />
      <stop offset="100%" stop-color="#6F3DFF" />
    </linearGradient>
  </defs>
</svg>
