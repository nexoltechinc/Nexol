<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#0B0B12" />
    <link rel="icon" type="image/png" href="/logo-transparent.png" />
    <link rel="apple-touch-icon" href="/logo-transparent.png" />
    <link rel="canonical" href="https://nexoltech.com/" />

    <!-- Open Graph / LinkedIn / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nexoltech.com/" />

    <meta property="og:image" content="/logo-transparent.png" />
    <meta property="og:site_name" content="Nexol Tech Solutions" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />

    <meta property="twitter:image" content="/logo-transparent.png" />

    <!-- Structured JSON-LD Data for Google Knowledge Graph -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Nexol Tech Solutions",
      "url": "https://nexoltech.com/",
      "logo": "https://nexoltech.com/logo-transparent.png",
      "description": "Custom software, AI automation, dashboards, web systems, and e-commerce solutions for modern businesses.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Islandia",
        "addressRegion": "NY",
        "addressCountry": "US"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "info@nexoltech.com",
        "contactType": "Sales"
      },
      "sameAs": [
        "https://www.linkedin.com/company/nexoltech",
        "https://twitter.com/nexoltech"
      ]
    }
    </script>
  </head>
  <body class="bg-[#0B0B12] antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
